<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f10;
color:white;
}

/* الهيدر */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111;
position:sticky;
top:0;
}

nav button{
background:none;
border:none;
color:white;
margin:0 8px;
cursor:pointer;
font-size:16px;
}

input{
padding:8px;
border-radius:10px;
border:none;
}

/* الصفحات */
.page{display:none;padding:20px;}
.active{display:block;}

/* المنتجات */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.card{
background:#1c1c1e;
padding:15px;
border-radius:15px;
text-align:center;
}

button.action{
margin:5px;
padding:8px;
border:none;
border-radius:10px;
cursor:pointer;
}

.buy{background:white;color:black}
.fav{background:red;color:white}

/* السلة */
.cartBox{
position:fixed;
right:10px;
bottom:10px;
background:#111;
padding:10px;
border-radius:15px;
width:220px;
max-height:300px;
overflow:auto;
}

.item{
font-size:13px;
padding:5px;
border-bottom:1px solid #333;
}
</style>
</head>

<body>

<header>
<div>🛍️ Super Store</div>

<nav>
<button onclick="show('home')">الرئيسية</button>
<button onclick="show('shop')">المتجر</button>
<button onclick="show('cart')">السلة</button>
</nav>

<input id="search" placeholder="بحث...">
</header>

<!-- HOME -->
<div id="home" class="page active">
<h1>متجر احترافي 🚀</h1>
<p>أفضل تجربة تسوق داخل ملف واحد</p>
</div>

<!-- SHOP -->
<div id="shop" class="page">

<h2>🛒 المنتجات</h2>

<div class="grid">

<div class="card">
<h3>iPhone 15</h3>
<p>4500 ريال</p>
<button class="action buy" onclick="add('iPhone 15')">شراء</button>
<button class="action fav" onclick="fav('iPhone 15')">❤️</button>
</div>

<div class="card">
<h3>Samsung S24</h3>
<p>3200 ريال</p>
<button class="action buy" onclick="add('Samsung S24')">شراء</button>
<button class="action fav" onclick="fav('Samsung S24')">❤️</button>
</div>

<div class="card">
<h3>MacBook Pro</h3>
<p>8000 ريال</p>
<button class="action buy" onclick="add('MacBook Pro')">شراء</button>
<button class="action fav" onclick="fav('MacBook Pro')">❤️</button>
</div>

</div>
</div>

<!-- CART -->
<div id="cart" class="page">
<h2>🧺 السلة</h2>
<ul id="list"></ul>
<button onclick="clearCart()">مسح السلة</button>
</div>

<!-- CART BOX -->
<div class="cartBox">
<h4>السلة السريعة</h4>
<div id="cartBox"></div>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let favs = JSON.parse(localStorage.getItem("favs")) || [];

/* تنقل بين الصفحات */
function show(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(page).classList.add("active");
render();
}

/* إضافة للسلة */
function add(item){
cart.push(item);
localStorage.setItem("cart",JSON.stringify(cart));
notify("🛒 تمت الإضافة");
render();
}

/* مفضلة */
function fav(item){
favs.push(item);
localStorage.setItem("favs",JSON.stringify(favs));
notify("❤️ تمت الإضافة للمفضلة");
}

/* عرض السلة */
function render(){

let box=document.getElementById("cartBox");
box.innerHTML="";

cart.forEach(i=>{
let div=document.createElement("div");
div.className="item";
div.innerText=i;
box.appendChild(div);
});

/* صفحة السلة */
let list=document.getElementById("list");
if(list){
list.innerHTML="";
cart.forEach(i=>{
let li=document.createElement("li");
li.innerText=i;
list.appendChild(li);
});
}
}

/* مسح */
function clearCart(){
cart=[];
localStorage.setItem("cart",JSON.stringify(cart));
render();
}

/* إشعار */
function notify(msg){
let n=document.createElement("div");
n.innerText=msg;
n.style.position="fixed";
n.style.bottom="20px";
n.style.left="20px";
n.style.background="black";
n.style.padding="10px";
n.style.borderRadius="10px";
document.body.appendChild(n);
setTimeout(()=>n.remove(),2000);
}

/* بحث */
document.getElementById("search").addEventListener("input",e=>{
let v=e.target.value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?"block":"none";
});
});

/* تشغيل */
render();

</script>

</body>
</html>
