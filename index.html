<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0e0f12;
color:white;
}

/* الهيدر */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111;
position:sticky;
top:0;
}

nav button{
background:none;
border:none;
color:white;
margin:0 5px;
cursor:pointer;
}

input{
padding:8px;
border-radius:10px;
border:none;
outline:none;
}

/* الصفحات */
.page{display:none;padding:20px;}
.active{display:block;}

/* الهيرو */
.hero{
text-align:center;
padding:60px 20px;
}

.hero h1{font-size:50px;margin:0}
.hero p{color:#aaa}

/* المنتجات */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.card{
background:#1c1c1e;
padding:15px;
border-radius:15px;
text-align:center;
transition:0.3s;
}

.card:hover{transform:scale(1.03)}

.btn{
padding:8px 12px;
margin:5px;
border:none;
border-radius:10px;
cursor:pointer;
}

.buy{background:white;color:black}
.fav{background:red;color:white}
.info{background:#2f7bff;color:white}

/* السلة */
.cartBox{
position:fixed;
right:10px;
bottom:10px;
background:#111;
padding:10px;
border-radius:15px;
width:240px;
max-height:300px;
overflow:auto;
}

.item{
font-size:13px;
border-bottom:1px solid #333;
padding:5px;
}

/* checkout */
.checkout{
background:#1c1c1e;
padding:20px;
border-radius:15px;
max-width:400px;
margin:auto;
text-align:center;
}
</style>
</head>

<body>

<header>
<div>🛍️ Complete Store</div>

<nav>
<button onclick="show('home')">الرئيسية</button>
<button onclick="show('shop')">المتجر</button>
<button onclick="show('cart')">السلة (<span id="count">0</span>)</button>
<button onclick="show('checkout')">الدفع</button>
</nav>

<input id="search" placeholder="بحث...">
</header>

<!-- HOME -->
<div id="home" class="page active">
<div class="hero">
<h1>🔥 متجر احترافي</h1>
<p>HTML + CSS + JS في ملف واحد</p>
<button class="btn buy" onclick="show('shop')">ابدأ التسوق</button>
</div>
</div>

<!-- SHOP -->
<div id="shop" class="page">

<div class="grid">

<div class="card">
<h3>iPhone 15</h3>
<p>4500</p>
<button class="btn buy" onclick="add('iPhone 15',4500)">شراء</button>
<button class="btn fav" onclick="fav('iPhone 15')">❤️</button>
<button class="btn info" onclick="openProduct('iPhone 15',4500)">تفاصيل</button>
</div>

<div class="card">
<h3>Samsung S24</h3>
<p>3200</p>
<button class="btn buy" onclick="add('Samsung S24',3200)">شراء</button>
</div>

<div class="card">
<h3>MacBook Pro</h3>
<p>8000</p>
<button class="btn buy" onclick="add('MacBook Pro',8000)">شراء</button>
</div>

<div class="card">
<h3>PS5</h3>
<p>2200</p>
<button class="btn buy" onclick="add('PS5',2200)">شراء</button>
</div>

</div>
</div>

<!-- CART -->
<div id="cart" class="page">
<h2>🧺 السلة</h2>
<ul id="list"></ul>
<button class="btn buy" onclick="pay()">الدفع</button>
<button class="btn fav" onclick="clearCart()">مسح</button>
</div>

<!-- CHECKOUT -->
<div id="checkout" class="page">
<div class="checkout">
<h2>💳 الدفع</h2>
<p>عدد المنتجات: <span id="total"></span></p>
<button class="btn buy" onclick="pay()">إتمام الدفع</button>
</div>
</div>

<!-- FLOAT CART -->
<div class="cartBox">
<h4>السلة</h4>
<div id="cartBox"></div>
</div>

<script>

/* بيانات */
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let favs = JSON.parse(localStorage.getItem("favs")) || [];
let current={};

/* صفحات */
function show(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(page).classList.add("active");
render();
}

/* إضافة */
function add(name,price){
cart.push({name,price});
localStorage.setItem("cart",JSON.stringify(cart));
notify("🛒 تمت الإضافة");
render();
}

/* مفضلة */
function fav(name){
favs.push(name);
localStorage.setItem("favs",JSON.stringify(favs));
notify("❤️ تمت الإضافة");
}

/* منتج */
function openProduct(name,price){
current={name,price};
show('checkout');
document.getElementById("total").innerText=price;
}

/* دفع */
function pay(){
cart=[];
localStorage.setItem("cart",JSON.stringify(cart));
notify("🎉 تم الدفع بنجاح");
render();
show('home');
}

/* مسح */
function clearCart(){
cart=[];
localStorage.setItem("cart",JSON.stringify(cart));
render();
}

/* render */
function render(){

document.getElementById("count").innerText=cart.length;

/* float cart */
let box=document.getElementById("cartBox");
box.innerHTML="";
cart.forEach(i=>{
let d=document.createElement("div");
d.className="item";
d.innerText=i.name+" - "+i.price;
box.appendChild(d);
});

/* cart page */
let list=document.getElementById("list");
if(list){
list.innerHTML="";
cart.forEach(i=>{
let li=document.createElement("li");
li.innerText=i.name+" - "+i.price;
list.appendChild(li);
});
}

/* total */
document.getElementById("total").innerText =
cart.reduce((a,b)=>a+b.price,0);
}

/* إشعار */
function notify(msg){
let n=document.createElement("div");
n.innerText=msg;
n.style.position="fixed";
n.style.bottom="20px";
n.style.left="20px";
n.style.background="black";
n.style.padding="10px";
n.style.borderRadius="10px";
document.body.appendChild(n);
setTimeout(()=>n.remove(),2000);
}

/* بحث */
document.getElementById("search").addEventListener("input",e=>{
let v=e.target.value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?"block":"none";
});
});

/* تشغيل */
render();

</script>

</body>
</html>
