<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Fun Store</title>

<style>
:root{
--bg1:#0b1020;
--bg2:#111827;
--card:rgba(255,255,255,0.06);
--text:white;
}

body.light{
--bg1:#f5f7ff;
--bg2:#ffffff;
--card:rgba(0,0,0,0.05);
--text:black;
}

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
color:var(--text);
transition:0.3s;
}

/* هيدر */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:100;
}

nav button{
background:none;
border:none;
color:var(--text);
margin:0 6px;
cursor:pointer;
}

input{
padding:8px;
border-radius:10px;
border:none;
outline:none;
}

/* صفحات */
.page{display:none;padding:20px;}
.active{display:block}

/* هيرو */
.hero{
text-align:center;
padding:60px 20px;
}

.hero h1{
font-size:55px;
margin:0;
background:linear-gradient(90deg,#60a5fa,#34d399);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* grid */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-top:15px;
}

/* card */
.card{
background:var(--card);
padding:15px;
border-radius:15px;
text-align:center;
transition:0.3s;
backdrop-filter:blur(10px);
}

.card:hover{
transform:translateY(-5px);
}

/* صورة */
.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

/* buttons */
.btn{
padding:8px 10px;
margin:5px;
border:none;
border-radius:10px;
cursor:pointer;
}

.buy{background:#22c55e;color:white}
.fav{background:#ef4444;color:white}
.info{background:#3b82f6;color:white}

/* سلة */
.cartBox{
position:fixed;
right:10px;
bottom:10px;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:15px;
width:260px;
max-height:300px;
overflow:auto;
backdrop-filter:blur(10px);
}

.item{
font-size:13px;
border-bottom:1px solid #333;
padding:5px;
}

/* نافذة المنتج */
.modal{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.9);
padding:20px;
border-radius:15px;
display:none;
width:300px;
}

.modal img{
width:100%;
border-radius:10px;
}
</style>
</head>

<body>

<header>
<div>🛍️ Super Store</div>

<nav>
<button onclick="show('home')">الرئيسية</button>
<button onclick="show('shop')">المتجر</button>
<button onclick="show('cart')">السلة (<span id="count">0</span>)</button>
<button onclick="toggleTheme()">🌙</button>
</nav>

<input id="search" placeholder="ابحث...">
</header>

<!-- HOME -->
<div id="home" class="page active">
<div class="hero">
<h1>🔥 متجر ممتع جدًا</h1>
<p>ألوان + صور + تفاعل + تجربة حقيقية</p>
<button class="btn buy" onclick="show('shop')">ابدأ</button>
</div>
</div>

<!-- SHOP -->
<div id="shop" class="page">

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
<h3>iPhone 15</h3>
<p>4500</p>
<button class="btn buy" onclick="add('iPhone 15',4500)">شراء</button>
<button class="btn fav" onclick="fav('iPhone 15')">❤️</button>
<button class="btn info" onclick="openProduct('iPhone 15','https://images.unsplash.com/photo-1511707171634-5f897ff02aa9',4500)">تفاصيل</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1598327105666-5b89351aff97">
<h3>Samsung S24</h3>
<p>3200</p>
<button class="btn buy" onclick="add('Samsung S24',3200)">شراء</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
<h3>MacBook Pro</h3>
<p>8500</p>
<button class="btn buy" onclick="add('MacBook Pro',8500)">شراء</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1606813907291-d86efa9b94db">
<h3>PS5</h3>
<p>2200</p>
<button class="btn buy" onclick="add('PS5',2200)">شراء</button>
</div>

</div>
</div>

<!-- CART -->
<div id="cart" class="page">
<h2>🧺 السلة</h2>
<ul id="list"></ul>
</div>

<!-- FLOAT CART -->
<div class="cartBox">
<h4>السلة</h4>
<div id="cartBox"></div>
</div>

<!-- PRODUCT MODAL -->
<div class="modal" id="modal">
<img id="mimg">
<h3 id="mname"></h3>
<p id="mprice"></p>
<button class="btn buy" onclick="buyFromModal()">شراء</button>
<button class="btn fav" onclick="closeModal()">إغلاق</button>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let favs = JSON.parse(localStorage.getItem("favs")) || [];
let current={};

/* صفحات */
function show(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
render();
}

/* إضافة */
function add(name,price){
cart.push({name,price});
localStorage.setItem("cart",JSON.stringify(cart));
notify("🛒 تمت الإضافة");
render();
}

/* مفضلة */
function fav(name){
favs.push(name);
localStorage.setItem("favs",JSON.stringify(favs));
notify("❤️ مفضلة");
}

/* منتج */
function openProduct(name,img,price){
current={name,price};
document.getElementById("mimg").src=img;
document.getElementById("mname").innerText=name;
document.getElementById("mprice").innerText=price+" ريال";
document.getElementById("modal").style.display="block";
}

/* شراء من المودال */
function buyFromModal(){
add(current.name,current.price);
closeModal();
}

/* إغلاق */
function closeModal(){
document.getElementById("modal").style.display="none";
}

/* وضع */
function toggleTheme(){
document.body.classList.toggle("light");
}

/* render */
function render(){

document.getElementById("count").innerText=cart.length;

let box=document.getElementById("cartBox");
box.innerHTML="";
cart.forEach(i=>{
let d=document.createElement("div");
d.className="item";
d.innerText=i.name+" - "+i.price;
box.appendChild(d);
});

let list=document.getElementById("list");
if(list){
list.innerHTML="";
cart.forEach(i=>{
let li=document.createElement("li");
li.innerText=i.name+" - "+i.price;
list.appendChild(li);
});
}
}

/* إشعار */
function notify(msg){
let n=document.createElement("div");
n.innerText=msg;
n.style.position="fixed";
n.style.bottom="20px";
n.style.left="20px";
n.style.background="black";
n.style.padding="10px";
n.style.borderRadius="10px";
document.body.appendChild(n);
setTimeout(()=>n.remove(),2000);
}

/* بحث */
document.getElementById("search").addEventListener("input",e=>{
let v=e.target.value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?"block":"none";
});
});

render();

</script>

</body>
</html>
