<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Style Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* header */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111827;
position:sticky;
top:0;
z-index:100;
}

nav button{
background:none;
border:none;
color:white;
margin:0 5px;
cursor:pointer;
}

input{
padding:8px;
border-radius:10px;
border:none;
outline:none;
}

/* pages */
.page{display:none;padding:20px;}
.active{display:block}

/* login */
.login{
max-width:300px;
margin:100px auto;
background:#1c1c1e;
padding:20px;
border-radius:15px;
text-align:center;
}

/* hero */
.hero{
text-align:center;
padding:60px;
}

.hero h1{
font-size:50px;
background:linear-gradient(90deg,#60a5fa,#34d399);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* grid */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

/* card */
.card{
background:#1c1c1e;
padding:15px;
border-radius:15px;
text-align:center;
transition:0.3s;
}

.card:hover{transform:scale(1.03)}

.card img{
width:100%;
height:140px;
object-fit:cover;
border-radius:10px;
}

/* buttons */
.btn{
padding:8px;
border:none;
border-radius:10px;
cursor:pointer;
margin:5px;
}

.buy{background:#22c55e;color:white}
.fav{background:#ef4444;color:white}
.info{background:#3b82f6;color:white}

/* cart */
.cartBox{
background:#111827;
padding:10px;
border-radius:10px;
margin-top:10px;
}

/* modal */
.modal{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#1c1c1e;
padding:20px;
border-radius:15px;
display:none;
width:300px;
}

.modal img{
width:100%;
border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="page active">
<div class="login">
<h2>🔐 تسجيل دخول</h2>
<input id="user" placeholder="اسمك">
<br><br>
<button class="btn buy" onclick="login()">دخول</button>
</div>
</div>

<!-- STORE -->
<div id="store" class="page">

<header>
<div>🛍️ Amazon Style</div>

<nav>
<button onclick="show('home')">الرئيسية</button>
<button onclick="show('shop')">المتجر</button>
<button onclick="show('cart')">السلة (<span id="count">0</span>)</button>
<button onclick="show('admin')">لوحة</button>
</nav>

<input id="search" placeholder="بحث...">
</header>

<!-- HOME -->
<div id="home" class="page active">
<div class="hero">
<h1>🔥 متجر عالمي</h1>
<p>نسخة قوية داخل HTML فقط</p>
<button class="btn buy" onclick="show('shop')">ابدأ</button>
</div>
</div>

<!-- SHOP -->
<div id="shop" class="page">

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
<h3>iPhone 15</h3>
<p>4500</p>
<button class="btn buy" onclick="add('iPhone 15',4500)">شراء</button>
<button class="btn fav" onclick="fav('iPhone 15')">❤️</button>
<button class="btn info" onclick="openP('iPhone 15',4500,'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9')">تفاصيل</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1598327105666-5b89351aff97">
<h3>Samsung S24</h3>
<p>3200</p>
<button class="btn buy" onclick="add('Samsung S24',3200)">شراء</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
<h3>MacBook</h3>
<p>8500</p>
<button class="btn buy" onclick="add('MacBook',8500)">شراء</button>
</div>

</div>
</div>

<!-- CART -->
<div id="cart" class="page">
<h2>🧺 السلة</h2>
<div id="list"></div>
<h3>الإجمالي: <span id="total"></span></h3>
<button class="btn buy" onclick="pay()">دفع</button>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<h2>📊 لوحة التحكم</h2>
<p>عدد المنتجات في السلة: <span id="adminCount"></span></p>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<img id="img">
<h3 id="name"></h3>
<p id="price"></p>
<button class="btn buy" onclick="addModal()">إضافة</button>
<button class="btn fav" onclick="closeM()">إغلاق</button>
</div>

<script>

let cart=[];
let favs=[];
let current={};
let user="";

/* login */
function login(){
user=document.getElementById("user").value;
if(!user) return alert("اكتب اسمك");
document.getElementById("login").classList.remove("active");
document.getElementById("store").classList.add("active");
}

/* show pages */
function show(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
render();
}

/* add */
function add(n,p){
cart.push({n,p});
render();
}

/* fav */
function fav(n){
favs.push(n);
}

/* modal */
function openP(n,p,img){
current={n,p};
document.getElementById("img").src=img;
document.getElementById("name").innerText=n;
document.getElementById("price").innerText=p;
document.getElementById("modal").style.display="block";
}

function closeM(){
document.getElementById("modal").style.display="none";
}

function addModal(){
add(current.n,current.p);
closeM();
}

/* render */
function render(){

document.getElementById("count").innerText=cart.length;

let list=document.getElementById("list");
if(list){
list.innerHTML="";
cart.forEach(i=>{
let d=document.createElement("div");
d.innerText=i.n+" - "+i.p;
list.appendChild(d);
});
}

let total=cart.reduce((a,b)=>a+b.p,0);
document.getElementById("total").innerText=total;

let admin=document.getElementById("adminCount");
if(admin) admin.innerText=cart.length;
}

/* pay */
function pay(){
alert("تم الدفع: "+cart.reduce((a,b)=>a+b.p,0));
cart=[];
render();
}

/* search */
document.getElementById("search").addEventListener("input",e=>{
let v=e.target.value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?"block":"none";
});
});

render();

</script>

</body>
</html>
